global:
  imageTag: v0.9.4
  imagePullPolicy: IfNotPresent

auth:
  required: true
  oidcIssuer: https://apps.maxautocables.com/application/o/openballoon-maxauto/
  oidcJwksUrl: https://apps.maxautocables.com/application/o/openballoon-maxauto/jwks/
  oidcAudience:
  tenantClaim: tenant_id

defaultResources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2048Mi

services:
  frontend:
    replicas: 3
    image:
      tag: v0.9.4
      pullPolicy: Always
    env:
      VITE_OIDC_ISSUER: https://apps.maxautocables.com/application/o/openballoon-maxauto/
      VITE_OIDC_CLIENT_ID: pUDiYjGaIpKBnaFjlDhp3UfHum7gBj3dZghLHkCP
      VITE_OIDC_SCOPE: openid profile email
      VITE_OIDC_AUDIENCE:
      VITE_TENANT_CLAIM: tenant_id
  drawing-service:
    replicas: 3
  geometry-service:
    replicas: 3
  balloon-service:
    replicas: 3
  ai-service:
    replicas: 3
  mcp-service:
    replicas: 3
  revision-service:
    replicas: 3
  dwg-translation-service:
    replicas: 3
  pdf-worker-service:
    replicas: 3
    image:
      tag: v0.9.4
      pullPolicy: Always
  postgres:
    replicas: 1
  redis:
    replicas: 1
  minio:
    replicas: 1
  openfga:
    replicas: 1
