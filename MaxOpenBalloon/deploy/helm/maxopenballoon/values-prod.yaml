global:
  imageTag: prod
  imagePullPolicy: IfNotPresent

auth:
  required: true
  oidcIssuer: https://auth.edge.example.com/application/o/maxopenballoon/
  oidcJwksUrl: ""
  oidcAudience: maxopenballoon
  tenantClaim: tenant_id

defaultResources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2048Mi

services:
  frontend:
    replicas: 3
  drawing-service:
    replicas: 3
  geometry-service:
    replicas: 3
  balloon-service:
    replicas: 3
  ai-service:
    replicas: 3
  mcp-service:
    replicas: 3
  revision-service:
    replicas: 3
  dwg-translation-service:
    replicas: 3
  pdf-worker-service:
    replicas: 3
  postgres:
    replicas: 1
  redis:
    replicas: 1
  minio:
    replicas: 1
  openfga:
    replicas: 1
