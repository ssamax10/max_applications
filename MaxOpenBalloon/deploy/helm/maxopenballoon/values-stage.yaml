global:
  imageTag: v0.9.2
  imagePullPolicy: IfNotPresent

auth:
  required: true
  oidcIssuer: https://auth.edge.example.com/application/o/maxopenballoon/
  oidcJwksUrl: ""
  oidcAudience: maxopenballoon-stage
  tenantClaim: tenant_id

defaultResources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

services:
  frontend:
    replicas: 2
  drawing-service:
    replicas: 2
  geometry-service:
    replicas: 2
  balloon-service:
    replicas: 2
  ai-service:
    replicas: 2
  mcp-service:
    replicas: 2
  revision-service:
    replicas: 2
  dwg-translation-service:
    replicas: 2
  pdf-worker-service:
    replicas: 2
  postgres:
    replicas: 1
  redis:
    replicas: 1
  minio:
    replicas: 1
  openfga:
    replicas: 1
