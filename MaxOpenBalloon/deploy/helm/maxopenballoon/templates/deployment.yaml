{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Chart.Name }}-{{ $name }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $.Chart.Name }}-{{ $name }}
  template:
    metadata:
      labels:
        app: {{ $.Chart.Name }}-{{ $name }}
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $svc.image.repository }}:{{ default $.Values.global.imageTag $svc.image.tag }}"
          imagePullPolicy: {{ default $.Values.global.imagePullPolicy $svc.image.pullPolicy }}
          {{- if $svc.command }}
          command:
{{ toYaml $svc.command | nindent 12 }}
          {{- end }}
          {{- if $svc.args }}
          args:
{{ toYaml $svc.args | nindent 12 }}
          {{- end }}
          env:
            {{- if $svc.injectAuthEnv }}
            - name: AUTH_REQUIRED
              value: {{ $.Values.auth.required | quote }}
            - name: OIDC_ISSUER
              value: {{ $.Values.auth.oidcIssuer | quote }}
            - name: OIDC_JWKS_URL
              value: {{ $.Values.auth.oidcJwksUrl | quote }}
            - name: OIDC_AUDIENCE
              value: {{ $.Values.auth.oidcAudience | quote }}
            - name: TENANT_CLAIM
              value: {{ $.Values.auth.tenantClaim | quote }}
            {{- end }}
            {{- range $envName, $envValue := $svc.env }}
            - name: {{ $envName }}
              value: {{ $envValue | quote }}
            {{- end }}
          ports:
            - containerPort: {{ default 8000 $svc.containerPort }}
          resources:
{{ toYaml (default $.Values.defaultResources $svc.resources) | nindent 12 }}
---
{{- end }}
{{- end }}
