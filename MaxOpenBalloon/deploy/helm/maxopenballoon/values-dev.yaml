global:
  imageTag: v0.9.2
  imagePullPolicy: IfNotPresent

auth:
  required: true
  oidcIssuer: https://auth.edge.example.com/application/o/maxopenballoon/
  oidcJwksUrl: ""
  oidcAudience: maxopenballoon-dev
  tenantClaim: tenant_id

defaultResources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 500m
    memory: 512Mi

services:
  frontend:
    replicas: 1
  drawing-service:
    replicas: 1
  geometry-service:
    replicas: 1
  balloon-service:
    replicas: 1
  ai-service:
    replicas: 1
  mcp-service:
    replicas: 1
  revision-service:
    replicas: 1
  dwg-translation-service:
    replicas: 1
  pdf-worker-service:
    replicas: 1
  postgres:
    replicas: 1
  redis:
    replicas: 1
  minio:
    replicas: 1
  openfga:
    replicas: 1
