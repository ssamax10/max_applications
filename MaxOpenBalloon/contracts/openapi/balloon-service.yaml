openapi: 3.1.0
info:
  title: Balloon Service API
  version: 1.2.0
servers:
  - url: /balloon
paths:
  /health:
    get:
      responses:
        '200': { description: OK }
  /health/live:
    get:
      responses:
        '200': { description: Liveness status }
  /health/ready:
    get:
      responses:
        '200': { description: Readiness status }
  /tenant-context:
    get:
      responses:
        '200': { description: Tenant context }
  /balloons:
    post:
      summary: Create balloon annotation
      responses:
        '200':
          description: Balloon created
  /drawings/{drawing_id}/balloons:
    get:
      summary: List balloons by drawing
      parameters:
        - in: path
          name: drawing_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Balloon list
