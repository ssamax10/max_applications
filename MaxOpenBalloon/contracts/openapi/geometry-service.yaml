openapi: 3.1.0
info:
  title: Geometry Service API
  version: 1.2.0
servers:
  - url: /geometry
paths:
  /health:
    get:
      responses:
        '200': { description: OK }
  /health/live:
    get:
      responses:
        '200': { description: Liveness status }
  /health/ready:
    get:
      responses:
        '200': { description: Readiness status }
  /tenant-context:
    get:
      responses:
        '200': { description: Tenant context }
  /geometry/extract:
    post:
      summary: Extract geometry features from drawing revision
      responses:
        '200':
          description: Geometry extraction response
