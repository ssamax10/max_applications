openapi: 3.1.0
info:
  title: Revision Service API
  version: 1.2.0
servers:
  - url: /revision
paths:
  /health:
    get:
      responses:
        '200': { description: OK }
  /health/live:
    get:
      responses:
        '200': { description: Liveness status }
  /health/ready:
    get:
      responses:
        '200': { description: Readiness status }
  /tenant-context:
    get:
      responses:
        '200': { description: Tenant context }
  /revisions:
    post:
      summary: Create revision entry
      responses:
        '200': { description: Revision created }
  /drawings/{drawing_id}/revisions:
    get:
      summary: List drawing revisions
      parameters:
        - in: path
          name: drawing_id
          required: true
          schema:
            type: string
      responses:
        '200': { description: Revision list }
  /revisions/diff:
    get:
      summary: Compute revision diff summary
      parameters:
        - in: query
          name: drawing_id
          required: true
          schema:
            type: string
        - in: query
          name: left_revision
          required: true
          schema:
            type: integer
        - in: query
          name: right_revision
          required: true
          schema:
            type: integer
      responses:
        '200': { description: Revision diff response }
