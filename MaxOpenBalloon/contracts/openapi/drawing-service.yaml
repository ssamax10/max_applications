openapi: 3.1.0
info:
  title: Drawing Service API
  version: 1.2.0
servers:
  - url: /drawing
paths:
  /health:
    get:
      responses:
        '200': { description: OK }
  /health/live:
    get:
      responses:
        '200': { description: Liveness status }
  /health/ready:
    get:
      responses:
        '200': { description: Readiness status }
  /tenant-context:
    get:
      responses:
        '200': { description: Tenant context }
  /drawings:
    post:
      summary: Register drawing asset
      responses:
        '200': { description: Drawing created }
    get:
      summary: List tenant drawings
      responses:
        '200': { description: Drawing list }
  /drawings/{drawing_id}:
    get:
      summary: Get drawing details
      parameters:
        - in: path
          name: drawing_id
          required: true
          schema:
            type: string
      responses:
        '200': { description: Drawing details }
        '404': { description: Not found }
