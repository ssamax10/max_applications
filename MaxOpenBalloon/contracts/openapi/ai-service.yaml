openapi: 3.1.0
info:
  title: AI Service API
  version: 1.2.0
servers:
  - url: /ai
paths:
  /health:
    get:
      responses:
        '200': { description: OK }
  /health/live:
    get:
      responses:
        '200': { description: Liveness status }
  /health/ready:
    get:
      responses:
        '200': { description: Readiness status }
  /tenant-context:
    get:
      responses:
        '200': { description: Tenant context }
  /ai/suggest-balloons:
    post:
      summary: Generate AI balloon suggestions
      responses:
        '200':
          description: Suggestions generated
